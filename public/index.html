<!DOCTYPE html>
<html>
<head>
  <title>Podman Node.js Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🚀 Node.js Podman Demo</h1>

    <div class="grid">
      <div class="card">
        <h2>📦 Node.js</h2>
        <p id="node"></p>
      </div>

      <div class="card">
        <h2>💻 Hostname</h2>
        <p id="host"></p>
      </div>

      <div class="card">
        <h2>⏱ Time</h2>
        <p id="time"></p>
      </div>

      <div class="card">
        <h2>🌍 Platform</h2>
        <p id="platform"></p>
      </div>
    </div>

    <div class="status">🟢 Container Running</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
